{{template "base.html" .}}
{{define "content"}}
<div class="card">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px; flex-wrap: wrap;">
        <input type="text" id="logSearch" class="table-search" aria-label="Search logs" placeholder="🔍 Search logs..." style="flex: 1; margin-bottom: 0;">
        <div style="display: flex; gap: 6px; flex-wrap: wrap;">
            <button type="button" class="log-filter-btn active" data-filter="all">All</button>
            <button type="button" class="log-filter-btn" data-filter="rule">Rules</button>
            <button type="button" class="log-filter-btn" data-filter="error">Errors</button>
            <button type="button" class="log-filter-btn" data-filter="system">System</button>
        </div>
        <a href="/export_logs" class="btn" style="font-size: 13px; padding: 6px 12px; text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 14px; height: 14px; margin-right: 4px;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
            Export
        </a>
    </div>
    <div id="logOutput" style="font-family: monospace; font-size: 13px; line-height: 1.6;"></div>
</div>

<script type="application/json" id="logData">{{jsonStr .LogContent}}</script>

<script>
    const logBox = document.getElementById('logOutput');
    const logSearch = document.getElementById('logSearch');
    let currentFilter = 'all';
    let rawLogText = '';

    function classifyLine(line) {
        const lower = line.toLowerCase();
        if (lower.includes('error') || lower.includes('failed')) return 'log-error';
        if (lower.includes('rule matched') || lower.includes('removed:')) return 'log-rule';
        if (lower.includes('[dry run]')) return 'log-dryrun';
        if (lower.includes('skipped')) return 'log-warn';
        if (lower.includes('system:')) return 'log-system';
        if (lower.includes('completed. successfully')) return 'log-success';
        return 'log-default';
    }

    function filterCategory(cls) {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'rule') return cls === 'log-rule' || cls === 'log-dryrun' || cls === 'log-success';
        if (currentFilter === 'error') return cls === 'log-error' || cls === 'log-warn';
        if (currentFilter === 'system') return cls === 'log-system';
        return true;
    }

    function renderLogs() {
        const searchTerm = logSearch.value.toLowerCase();
        const lines = rawLogText.split('\n');
        let html = '';

        for (const line of lines) {
            if (!line.trim()) continue;
            const cls = classifyLine(line);
            if (!filterCategory(cls)) continue;
            if (searchTerm && !line.toLowerCase().includes(searchTerm)) continue;

            const escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html += '<div class="log-line ' + cls + '">' + escaped + '</div>';
        }

        logBox.innerHTML = html || '<div class="log-line log-default">No matching log entries.</div>';
    }

    function fetchLogs() {
        fetch('/api/logs', { headers: { 'X-API-Token': '{{.APIToken}}' } })
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
            .then(data => {
                if (data !== rawLogText) {
                    rawLogText = data;
                    renderLogs();
                }
            })
            .catch(err => console.error("Log fetch error:", err));
    }

    // Initial render from server-side content
    rawLogText = JSON.parse(document.getElementById('logData').textContent);
    renderLogs();

    // Auto-refresh
    setInterval(fetchLogs, 5000);

    // Search
    let searchTimeout;
    logSearch.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(renderLogs, 250);
    });

    // Filter buttons
    document.querySelectorAll('.log-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderLogs();
        });
    });
</script>
{{end}}
